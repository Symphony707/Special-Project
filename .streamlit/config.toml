[server]
maxUploadSize = 50
enableXsrfProtection = true
headless = true

[browser]
gatherUsageStats = false

[theme]
# Primary Accent (matches indigo-500)
primaryColor = "#6366f1"
# Dark Slate background
backgroundColor = "#0f172a"
# Subdued grey content area
secondaryBackgroundColor = "#1e293b"
# Soft light text
textColor = "#f8fafc"
font = "sans serif"
